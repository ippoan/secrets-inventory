# 月次 secret 棚卸 (Refs #86)
#
# GCP Secret Manager を SoT とする全 secret を 4 シグナル
# (Cloud Run 参照 / GH workflow YAML 参照 × 90 日 run 実績 / ラベル / 3-provider 突合)
# で分類し、レポート issue を起票する。GH Actions 消費クラスには
# `used-by-gh-<org>-<repo>` ラベルを中央刻印する (per-repo CI 方式は
# WIF の repository_owner==ippoan 制約で ohishi-exp から刻印できないため不採用)。
#
# 削除は scream test 2 段階:
#   mode=quarantine → versions disable + pending-destroy ラベル (可逆)
#   mode=destroy    → 隔離 30 日経過 & 全 version disabled のみ destroy (不可逆)
# quarantine / destroy には custom role `secretsInventoryAuditor` の grant が
# 必要 (report は既存 grant で動く)。手順: docs/secret-audit.md

name: Secret Audit

on:
  schedule:
    - cron: '0 0 1 * *' # 毎月 1 日 09:00 JST
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        type: choice
        options: [report, quarantine, destroy]
        default: report
      secrets:
        description: 'quarantine 対象 secret 名 (comma 区切り)'
        default: ''
      confirm:
        description: 'type-to-confirm: quarantine → QUARANTINE / destroy → DESTROY'
        default: ''
      stamp_labels:
        description: 'used-by-gh-* ラベルを刻印する (report)'
        type: boolean
        default: true
      create_issue:
        description: 'レポート issue を起票する (report)'
        type: boolean
        default: true
      delete_names:
        description: 'destroy 時に secret 名ごと削除 (default: tombstone 残置)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # WIF (staging-deploy SA)
  issues: write   # レポート issue 起票

concurrency:
  group: secret-audit
  cancel-in-progress: false

jobs:
  audit:
    if: vars.GCP_WIF_PROVIDER != '' && vars.GCP_WIF_SERVICE_ACCOUNT_STAGING != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Self-test (pure functions, network なし)
        run: python3 -m unittest discover -s scripts/secret-audit -p '*_test.py'

      # ippoan-ci-bot の installation token を org ごとに mint する。
      # App 側に Repository permissions → Actions: Read (run 実績照会) と
      # Contents: Read (workflow YAML 取得)、Organization permissions →
      # Secrets: Read (org secret 突合) が必要。
      - name: App token (ippoan)
        id: app-ippoan
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ippoan

      - name: App token (ohishi-exp)
        id: app-ohishi
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ohishi-exp

      - name: GCP auth (WIF)
        id: gcp
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_STAGING }}

      - name: Run audit
        env:
          GCP_ACCESS_TOKEN: ${{ steps.gcp.outputs.access_token }}
          GH_TOKEN_IPPOAN: ${{ steps.app-ippoan.outputs.token }}
          GH_TOKEN_OHISHI: ${{ steps.app-ohishi.outputs.token }}
          GH_ISSUE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_STAGING || 'cloudsql-sv' }}
          GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
          MODE: ${{ inputs.mode || 'report' }}
          TARGETS: ${{ inputs.secrets }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -eu
          case "$MODE" in
            report)
              FLAGS=""
              [ "${{ inputs.stamp_labels != false }}" = "true" ] || FLAGS="$FLAGS --no-stamp"
              [ "${{ inputs.create_issue != false }}" = "true" ] || FLAGS="$FLAGS --no-issue"
              # shellcheck disable=SC2086
              python3 scripts/secret-audit/audit.py report --out /tmp/secret-audit.md $FLAGS
              ;;
            quarantine)
              python3 scripts/secret-audit/audit.py quarantine \
                --secrets "$TARGETS" --confirm "$CONFIRM"
              ;;
            destroy)
              FLAGS=""
              if [ "${{ inputs.delete_names }}" = "true" ]; then FLAGS="--delete-names"; fi
              # shellcheck disable=SC2086
              python3 scripts/secret-audit/audit.py destroy --confirm "$CONFIRM" $FLAGS
              ;;
          esac

      - name: Step summary
        if: always()
        run: |
          if [ -f /tmp/secret-audit.md ]; then
            cat /tmp/secret-audit.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-audit-report
          path: /tmp/secret-audit.md
          if-no-files-found: ignore
          retention-days: 90
