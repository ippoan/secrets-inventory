name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    permissions:
      contents: read
      # frontend-ci.yml の nested `secret-verify` job が secret-verify-gcp.yml
      # を call し、その verify job が WIF OIDC token を mint するために
      # id-token: write を必須要求するため caller 側で declare する。
      # `if:` で skip される run でも reusable parse 時に permissions check が
      # 走るため、declare していないと startup_failure になる
      # (ci-workflows#39 merge 後の確認結果)。secrets-inventory-gcp の ci.yml
      # でも同じパターンで id-token: write を job-level に declare している。
      id-token: write
    with:
      project_type: 'worker'
      install_command: 'npm install'
      typecheck_command: 'npx tsc --noEmit'
      deploy_staging_script: 'npx wrangler deploy --env staging'
      deploy_release_script: 'npx wrangler deploy'
    secrets: inherit
