name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read
  # frontend-ci.yml の nested `secret-verify` job が secret-verify-gcp.yml
  # を call し、その verify job が WIF OIDC token を mint するために
  # id-token: write を要求する。`if:` で skip される run でも reusable
  # parse 時に caller permissions check が走るため、declare していないと
  # workflow 全体が startup_failure になる (ci-workflows#39 merge 後の確認
  # 結果、詳細は ci-workflows CLAUDE.md "startup_failure" troubleshoot)。
  id-token: write

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'worker'
      install_command: 'npm install'
      typecheck_command: 'npx tsc --noEmit'
      deploy_staging_script: 'npx wrangler deploy --env staging'
      deploy_release_script: 'npx wrangler deploy'
    secrets: inherit
