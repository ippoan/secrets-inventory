name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    permissions:
      contents: write          # auto-merge 用
      pull-requests: write     # auto-merge / pr-limit 用
      packages: read           # npm_scope 用
      id-token: write          # nested `secret-verify` job が WIF OIDC token を mint するため
    with:
      project_type: 'worker'
      install_command: 'npm install'
      typecheck_command: 'npx tsc --noEmit'
      deploy_staging_script: 'npx wrangler deploy --env staging'
      deploy_release_script: 'npx wrangler deploy'
      # GCP Secret Manager verify は frontend-ci の中に直列で組み込まれて
      # いる (ci-workflows#38)。`gcp_secret_verify_*` 3 input を渡すだけで
      # `ci / secret-verify` が test/typecheck の後段に追加される。
      # vars が未設定の間は ci-workflows 側の `if:` で skip され、deploy も
      # `skipped` 扱いで進む (backward compat)。
      gcp_secret_verify_project: cloudsql-sv
      gcp_secret_verify_provider: ${{ vars.GCP_WIF_PROVIDER }}
      gcp_secret_verify_sa: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_VERIFIER }}
    secrets: inherit
