name: Verify GCP Secrets

# Worker (`wrangler.jsonc` の `secrets.required`) が宣言する secret が
# **GCP Secret Manager に backup されているか** を CI で検証する caller。
# 親 worker は CF Secrets Store binding 3 種 (`cf-secrets-inventory-secrets-
# store-read` / `gh-secrets-inventory-org-secrets-read` / `secrets-inventory-
# gcp-proxy-api-key`) を使うので、対応する name で GCP にも投入されている
# 必要がある。
#
# 命名規約は #23 で kebab か SCREAMING_SNAKE どちらに寄せるか調整中だが、
# 現状は CF と同じ kebab-case で declare する暫定運用。CI で missing が
# 検出された時点で GCP 側に作るか、または declare を変えるかを判断。
#
# Auth は WIF で済ませる。verify 用 SA が cloudsql-sv project に未設定の
# 間は job 全体を skip して、本 Worker の通常 CI (test.yml) だけで PR を
# 通せるようにする。setup 完了後に `vars.GCP_WIF_*` を入れた瞬間に verify
# が走り始める。
#
# Refs #21, #23 (命名ポリシー)。姉妹 repo: secrets-inventory-gcp に同種
# caller あり (repo_type: cloud-run、#11 経由)。

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # WIF OIDC token mint 用

jobs:
  verify:
    if: |
      vars.GCP_WIF_PROVIDER != '' &&
      vars.GCP_WIF_SERVICE_ACCOUNT_VERIFIER != ''
    uses: ippoan/ci-workflows/.github/workflows/secret-verify-gcp.yml@main
    with:
      project: cloudsql-sv
      repo_type: worker
      # wrangler_path 未指定 → リポジトリ root の wrangler.jsonc を autodetect
      workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
      service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_VERIFIER }}
